{% extends 'store/base.html' %}
{% block content %}
<div class="max-w-2xl mx-auto p-6">
  <div class="bg-white rounded-xl shadow-lg p-8">
    <h2 class="text-2xl font-bold text-gray-800 mb-6">{{ title }}</h2>
    <form method="post" enctype="multipart/form-data" class="space-y-5">
      {% csrf_token %}
      {% for field in form %}
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">{{ field.label }}</label>
        <div class="w-full border border-gray-300 rounded-lg p-2 focus-within:ring-2 focus-within:ring-green-500">
          {{ field }}
        </div>
        {% if field.errors %}
        <p class="text-red-500 text-sm mt-1">{{ field.errors|join:", " }}</p>
        {% endif %}
      </div>
      {% endfor %}
      <div class="flex gap-3 pt-2">
        <button type="submit" class="bg-green-600 text-white px-6 py-2 rounded-lg hover:bg-green-700 transition font-medium">
          حفظ
        </button>
        <a href="{% url 'store:dashboard' %}" class="bg-gray-200 text-gray-700 px-6 py-2 rounded-lg hover:bg-gray-300 transition font-medium">
          إلغاء
        </a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
